{{- if .Values.k8sContainerServiceProvider.enabled }}
{{- if not .Values.k8sContainerServiceProvider.kubeconfig }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dcm.fullname" . }}-k8s-container-sp
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "dcm.fullname" . }}-k8s-container-sp
  namespace: {{ .Values.k8sContainerServiceProvider.namespace }}
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dcm.fullname" . }}-k8s-container-sp
  namespace: {{ .Values.k8sContainerServiceProvider.namespace }}
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "dcm.fullname" . }}-k8s-container-sp
subjects:
  - kind: ServiceAccount
    name: {{ include "dcm.fullname" . }}-k8s-container-sp
    namespace: {{ .Release.Namespace }}
---
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dcm.fullname" . }}-k8s-container-kubeconfig
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
type: Opaque
data:
  kubeconfig: {{ .Values.k8sContainerServiceProvider.kubeconfig | b64enc | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dcm.fullname" . }}-k8s-container-service-provider
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
    {{- include "dcm.selectorLabels" (dict "context" . "component" "k8s-container-service-provider") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dcm.selectorLabels" (dict "context" . "component" "k8s-container-service-provider") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dcm.selectorLabels" (dict "context" . "component" "k8s-container-service-provider") | nindent 8 }}
    spec:
      {{- if not .Values.k8sContainerServiceProvider.kubeconfig }}
      serviceAccountName: {{ include "dcm.fullname" . }}-k8s-container-sp
      {{- end }}
      containers:
        - name: k8s-container-service-provider
          image: "{{ .Values.k8sContainerServiceProvider.image }}:{{ include "dcm.imageTag" (dict "tag" .Values.k8sContainerServiceProvider.tag "global" .Values.global) }}"
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SP_NAME
              value: {{ .Values.k8sContainerServiceProvider.spName | quote }}
            - name: SP_ENDPOINT
              value: "http://{{ include "dcm.fullname" . }}-k8s-container-service-provider:8080"
            - name: DCM_REGISTRATION_URL
              value: "http://{{ include "dcm.fullname" . }}-control-plane:8080/api/v1alpha1"
            - name: SP_NATS_URL
              value: "nats://{{ include "dcm.fullname" . }}-nats:4222"
            - name: SP_K8S_NAMESPACE
              value: {{ .Values.k8sContainerServiceProvider.namespace | quote }}
            {{- if .Values.k8sContainerServiceProvider.kubeconfig }}
            - name: SP_K8S_KUBECONFIG
              value: /kubeconfig/kubeconfig
            {{- end }}
            - name: SP_K8S_EXTERNAL_SVC_TYPE
              value: {{ .Values.k8sContainerServiceProvider.externalSvcType | quote }}
          {{- if .Values.k8sContainerServiceProvider.kubeconfig }}
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
          {{- end }}
      {{- if .Values.k8sContainerServiceProvider.kubeconfig }}
      volumes:
        - name: kubeconfig
          secret:
            secretName: {{ include "dcm.fullname" . }}-k8s-container-kubeconfig
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dcm.fullname" . }}-k8s-container-service-provider
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "dcm.selectorLabels" (dict "context" . "component" "k8s-container-service-provider") | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
{{- end }}
