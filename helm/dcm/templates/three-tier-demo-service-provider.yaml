{{- if .Values.threeTierDemoServiceProvider.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dcm.fullname" . }}-three-tier-demo-sp
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
    {{- include "dcm.selectorLabels" (dict "context" . "component" "three-tier-demo-sp") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dcm.selectorLabels" (dict "context" . "component" "three-tier-demo-sp") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dcm.selectorLabels" (dict "context" . "component" "three-tier-demo-sp") | nindent 8 }}
    spec:
      initContainers:
        {{- include "dcm.waitForPostgres" . | nindent 8 }}
      containers:
        - name: three-tier-demo-service-provider
          image: "{{ .Values.threeTierDemoServiceProvider.image }}:{{ include "dcm.imageTag" (dict "tag" .Values.threeTierDemoServiceProvider.tag "global" .Values.global) }}"
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "dcm.fullname" . }}-db
          env:
            - name: DB_TYPE
              value: pgsql
            - name: DB_HOST
              value: {{ include "dcm.fullname" . }}-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: three-tier-sp
            - name: CONTAINER_SP_URL
              value: "http://{{ include "dcm.fullname" . }}-k8s-container-service-provider:8080"
            - name: SP_NAME
              value: {{ .Values.threeTierDemoServiceProvider.spName | quote }}
            - name: SP_ENDPOINT
              value: "http://{{ include "dcm.fullname" . }}-three-tier-demo-sp:8080"
            - name: DCM_REGISTRATION_URL
              value: "http://{{ include "dcm.fullname" . }}-service-provider-manager:8080/api/v1alpha1"
            - name: SP_NATS_URL
              value: "nats://{{ include "dcm.fullname" . }}-nats:4222"
            - name: SP_K8S_NAMESPACE
              value: {{ .Values.threeTierDemoServiceProvider.namespace | quote }}
            {{- if .Values.threeTierDemoServiceProvider.kubeconfig }}
            - name: SP_K8S_KUBECONFIG
              value: /kubeconfig/kubeconfig
            {{- end }}
          {{- if .Values.threeTierDemoServiceProvider.kubeconfig }}
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
          {{- end }}
      {{- if .Values.threeTierDemoServiceProvider.kubeconfig }}
      volumes:
        - name: kubeconfig
          secret:
            secretName: {{ include "dcm.fullname" . }}-k8s-container-kubeconfig
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dcm.fullname" . }}-three-tier-demo-sp
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "dcm.selectorLabels" (dict "context" . "component" "three-tier-demo-sp") | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
{{- end }}
