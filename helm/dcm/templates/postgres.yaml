apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dcm.fullname" . }}-postgres-init
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
data:
  01-create-databases.sql: |
    CREATE DATABASE "service-provider";
    CREATE DATABASE "policy-manager";
    CREATE DATABASE "catalog-manager";
    CREATE DATABASE "placement-manager";
    CREATE DATABASE "three-tier-sp";
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "dcm.fullname" . }}-postgres
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
    {{- include "dcm.selectorLabels" (dict "context" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: {{ include "dcm.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "dcm.selectorLabels" (dict "context" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dcm.selectorLabels" (dict "context" . "component" "postgres") | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "dcm.fullname" . }}-db
          env:
            - name: POSTGRES_DB
              value: postgres
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - postgres
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "dcm.fullname" . }}-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dcm.fullname" . }}-postgres
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "dcm.selectorLabels" (dict "context" . "component" "postgres") | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
