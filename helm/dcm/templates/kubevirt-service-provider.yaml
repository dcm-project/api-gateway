{{- if .Values.kubevirtServiceProvider.enabled }}
{{- if .Values.kubevirtServiceProvider.kubeconfig }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dcm.fullname" . }}-kubevirt-kubeconfig
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
type: Opaque
data:
  kubeconfig: {{ .Values.kubevirtServiceProvider.kubeconfig | b64enc | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dcm.fullname" . }}-kubevirt-service-provider
  labels:
    {{- include "dcm.labels" . | nindent 4 }}
    {{- include "dcm.selectorLabels" (dict "context" . "component" "kubevirt-service-provider") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dcm.selectorLabels" (dict "context" . "component" "kubevirt-service-provider") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dcm.selectorLabels" (dict "context" . "component" "kubevirt-service-provider") | nindent 8 }}
    spec:
      containers:
        - name: kubevirt-service-provider
          image: "{{ .Values.kubevirtServiceProvider.image }}:{{ include "dcm.imageTag" (dict "tag" .Values.kubevirtServiceProvider.tag "global" .Values.global) }}"
          env:
            - name: NATS_URL
              value: "nats://{{ include "dcm.fullname" . }}-nats:4222"
            - name: SERVICE_MANAGER_ENDPOINT
              value: "http://{{ include "dcm.fullname" . }}-control-plane:8080/api/v1alpha1"
            - name: PROVIDER_NAME
              value: {{ .Values.kubevirtServiceProvider.providerName | quote }}
            - name: PROVIDER_ENDPOINT
              value: "http://{{ include "dcm.fullname" . }}-kubevirt-service-provider:8081/api/v1alpha1/vms"
            - name: KUBERNETES_NAMESPACE
              value: {{ .Values.kubevirtServiceProvider.namespace | quote }}
            {{- if .Values.kubevirtServiceProvider.kubeconfig }}
            - name: KUBERNETES_KUBECONFIG
              value: /kubeconfig/kubeconfig
            {{- end }}
          {{- if .Values.kubevirtServiceProvider.kubeconfig }}
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
          {{- end }}
      {{- if .Values.kubevirtServiceProvider.kubeconfig }}
      volumes:
        - name: kubeconfig
          secret:
            secretName: {{ include "dcm.fullname" . }}-kubevirt-kubeconfig
      {{- end }}
{{- end }}
